{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - BV ParcelPing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-100 to-purple-100">

    <script>
        const NOTIF_API_URL = "{% url 'supervisor_notifications_api' %}";
    </script>

    <!-- Header -->
    <header class="bg-white shadow-md mb-6">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center">
                <img src="{% static 'images/bvlogo.jpg' %}" alt="Logo" class="w-10 h-10">
                <span class="ml-3 text-xl font-bold text-blue-800">Supervisor Notifications</span>
            </div>
            <button onclick="window.location.href='{% url 'supervisor' %}'"
                class="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-medium hover:bg-blue-100 hover:text-blue-700 transition">
                Back to Dashboard
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-10">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-blue-700">Recent Notifications</h2>
            <span id="unreadBadge" class="hidden px-3 py-1 bg-red-500 text-white text-sm font-semibold rounded-full"></span>
        </div>

        <!-- Loading -->
        <div id="loadingState" class="text-center py-16 text-gray-500">
            <svg class="w-8 h-8 animate-spin mx-auto mb-3 text-blue-400" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
            Loading notifications...
        </div>

        <!-- Empty -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="text-5xl mb-4">🔔</div>
            <p class="text-gray-500 font-medium">No notifications yet.</p>
            <p class="text-gray-400 text-sm mt-1">You'll be notified when parcels are added or statuses change.</p>
        </div>

        <!-- List -->
        <div id="notifList" class="space-y-4 hidden"></div>
    </main>

    <script>
        const TYPE_CONFIG = {
            parcel_added:       { bg: 'bg-blue-50',   border: 'border-blue-200',   titleColor: 'text-blue-800'   },
            status_update:      { bg: 'bg-green-50',  border: 'border-green-200',  titleColor: 'text-green-800'  },
            supervisor_added:   { bg: 'bg-purple-50', border: 'border-purple-200', titleColor: 'text-purple-800' },
            supervisor_deleted: { bg: 'bg-red-50',    border: 'border-red-200',    titleColor: 'text-red-800'    },
        };

        function timeAgo(dateStr) {
            const now = new Date();
            const date = new Date(dateStr);
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return 'Just now';
            if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
            if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function loadNotifications() {
            fetch(NOTIF_API_URL)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loadingState').classList.add('hidden');
                    const notifs = data.notifications || [];

                    if (notifs.length === 0) {
                        document.getElementById('emptyState').classList.remove('hidden');
                        return;
                    }

                    const list = document.getElementById('notifList');
                    list.classList.remove('hidden');
                    list.innerHTML = notifs.map(n => {
                        const cfg = TYPE_CONFIG[n.notif_type] || TYPE_CONFIG['parcel_added'];
                        const dot = !n.is_read
                            ? '<span class="inline-block w-2 h-2 bg-blue-500 rounded-full mr-2 align-middle"></span>'
                            : '';
                        return `
                            <div class="${cfg.bg} p-5 rounded-xl shadow-sm border ${cfg.border} hover:shadow-md transition">
                                <h3 class="font-semibold ${cfg.titleColor} mb-1">${dot}${n.title}</h3>
                                <p class="text-gray-700 text-sm mb-2">${n.message}</p>
                                <span class="text-xs text-gray-400">${timeAgo(n.created_at)}</span>
                            </div>`;
                    }).join('');
                })
                .catch(() => {
                    document.getElementById('loadingState').innerHTML =
                        '<p class="text-red-500 text-center">Failed to load notifications. Please refresh.</p>';
                });
        }

        document.addEventListener('DOMContentLoaded', loadNotifications);
    </script>
</body>
</html>
