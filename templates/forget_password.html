{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6 text-blue-600">
        Forgot Password
    </h2>

    <!-- STEP 1 : EMAIL -->
    <div id="step-email">
        <label class="block mb-2 font-medium">Enter your Banasthali Email:</label>
        <input type="email" id="email"
            placeholder="example@banasthali.in"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 mb-4">

        <button onclick="sendOTP()"
            class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
            Send OTP
        </button>
    </div>

    <!-- STEP 2 : OTP -->
    <div id="step-otp" class="hidden">
        <label class="block mb-2 font-medium mt-4">Enter OTP</label>
        <input type="text" id="otp"
            placeholder="Enter 6-digit OTP"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 mb-4">

        <button onclick="verifyOTP()"
            class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
            Verify OTP
        </button>
    </div>

    <!-- STEP 3 : RESET PASSWORD -->
    <div id="step-password" class="hidden">
        <label class="block mb-2 font-medium mt-4">New Password</label>
        <input type="password" id="newPassword"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 mb-4">

        <label class="block mb-2 font-medium">Confirm Password</label>
        <input type="password" id="confirmPassword"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 mb-4">

        <button onclick="resetPassword()"
            class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
            Reset Password
        </button>
    </div>

    <p id="message" class="text-sm text-center mt-4"></p>

</div>

<script>
    let verifiedEmail = "";
    let verifiedOTP = "";
    
    // STEP 1: SEND OTP
    async function sendOTP() {
        const email = document.getElementById("email").value.trim().toLowerCase();
    
        if (!email.endsWith("@banasthali.in")) {
            showMessage("Please enter a valid Banasthali email ID", "text-red-500");
            return;
        }
    
        showMessage("Sending OTP...", "text-blue-500");
    
        try {
            const response = await fetch('/api/send-otp/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
    
            const result = await response.json();
    
            if (result.success) {
                verifiedEmail = email;
                showMessage("OTP sent to your email. Check your inbox!", "text-green-600");
                document.getElementById("step-email").classList.add("hidden");
                document.getElementById("step-otp").classList.remove("hidden");
            } else {
                showMessage(result.error || "Failed to send OTP.", "text-red-500");
            }
        } catch (err) {
            showMessage("Network error. Please try again.", "text-red-500");
        }
    }
    
    // STEP 2: VERIFY OTP
    async function verifyOTP() {
        const otp = document.getElementById("otp").value.trim();
    
        if (!otp) {
            showMessage("Please enter the OTP.", "text-red-500");
            return;
        }
    
        showMessage("Verifying OTP...", "text-blue-500");
    
        try {
            const response = await fetch('/api/verify-otp/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: verifiedEmail, otp })
            });
    
            const result = await response.json();
    
            if (result.success) {
                verifiedOTP = otp;
                showMessage("OTP Verified Successfully!", "text-green-600");
                document.getElementById("step-otp").classList.add("hidden");
                document.getElementById("step-password").classList.remove("hidden");
            } else {
                showMessage(result.error || "Invalid OTP.", "text-red-500");
            }
        } catch (err) {
            showMessage("Network error. Please try again.", "text-red-500");
        }
    }
    
    // STEP 3: RESET PASSWORD
    async function resetPassword() {
        const newPass = document.getElementById("newPassword").value;
        const confirmPass = document.getElementById("confirmPassword").value;
    
        const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
    
        if (newPass.includes(" ")) {
            showMessage("Password must not contain spaces.", "text-red-500");
            return;
        }
    
        if (!passwordRegex.test(newPass)) {
            showMessage(
                "Password must be at least 8 characters with uppercase, lowercase, number, and special character.",
                "text-red-500"
            );
            return;
        }
    
        if (newPass !== confirmPass) {
            showMessage("Passwords do not match.", "text-red-500");
            return;
        }
    
        showMessage("Resetting password...", "text-blue-500");
    
        try {
            const response = await fetch('/api/reset-password/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: verifiedEmail,
                    otp: verifiedOTP,
                    newPassword: newPass
                })
            });
    
            const result = await response.json();
    
            if (result.success) {
                showMessage("Password reset successful! Redirecting...", "text-green-600");
                setTimeout(() => {
                    window.location.href = "{% url 'index' %}";
                }, 1500);
            } else {
                showMessage(result.error || "Failed to reset password.", "text-red-500");
            }
        } catch (err) {
            showMessage("Network error. Please try again.", "text-red-500");
        }
    }
    
    function showMessage(msg, colorClass) {
        const message = document.getElementById("message");
        message.innerText = msg;
        message.className = "text-sm text-center mt-4 " + colorClass;
    }
</script>
</body>
</html>
